<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Salud</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">

            <span class="navbar-brand">
                Mi Progreso
            </span>

            <div class="navbar-nav ms-auto">
                <a class="nav-link btn btn-outline-danger btn-sm text-white px-3"
                   href="login.html">
                    Cerrar Sesión
                </a>
            </div>

        </div>
    </nav>

    <div class="container my-5">

        <h2 class="mb-4">
            Seguimiento de Salud
        </h2>

        <div class="card mb-5 shadow-sm">

            <div class="card-body">

                <form id="formPeso" class="row g-3 align-items-end">

                    <div class="col-12 col-md-4">

                        <label for="pesoInput" class="form-label">
                            Peso actual (kg)
                        </label>

                        <input type="number"
                               step="0.1"
                               id="pesoInput"
                               class="form-control"
                               placeholder="00.0"
                               required>

                    </div>

                    <div class="col-12 col-md-4">

                        <label for="fechaInput" class="form-label">
                            Fecha de registro
                        </label>

                        <input type="date"
                               id="fechaInput"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-12 col-md-4">

                        <button type="submit"
                                class="btn btn-success w-100">
                            Registrar Peso
                        </button>

                    </div>

                </form>

            </div>

        </div>

        <div class="card shadow-sm mb-5">

            <div class="card-body">

                <h4 class="mb-4">
                    Gráfica de Peso
                </h4>

                <canvas id="miGrafica"></canvas>

            </div>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <h4 class="mb-3">
                    Historial de Registros
                </h4>

                <div class="table-responsive">

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">
                            <tr>
                                <th>Fecha</th>
                                <th>Peso Registrado</th>
                                <th>Estado</th>
                            </tr>
                        </thead>

                        <tbody id="tablaRegistros">

                             <tr>
                                <td>2026-06-26</td>
                                <td>52</td>
                                <td>
                                    <span class="badge bg-secondary">
                                        Estable
                                    </span>
                                </td>
                            </tr>
                             <tr>
                                <td>2026-06-27</td>
                                <td>50</td>
                                <td>
                                    <span class="badge bg-secondary">
                                        Estable
                                    </span>
                                </td>
                            </tr>
                              <tr>
                                <td>2026-06-25</td>
                                <td>49</td>
                                <td>
                                    <span class="badge bg-secondary">
                                        Estable
                                    </span>
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script>

        const pesos = [55.5,52.0,49.0];
        const fechas = ['25 Jun','26 Jun','27 Jun'];

        const ctx = document.getElementById('miGrafica');

        const grafica = new Chart(ctx, {

            type: 'line',

            data: {

                labels: fechas,

                datasets: [{

                    label: 'Peso (kg)',

                    data: pesos,

                    borderWidth: 3,

                    tension: 0.3,

                    fill: false
                }]
            },

            options: {

                responsive: true,

                plugins: {

                    legend: {
                        display: true
                    }
                },

                scales: {

                    y: {
                        beginAtZero: false
                    }
                }
            }
        });

        document.getElementById('formPeso').addEventListener('submit', function(event) {

            event.preventDefault();

            const peso = parseFloat(
                document.getElementById('pesoInput').value
            );

            const fechaCompleta =
                document.getElementById('fechaInput').value;

            const fecha = new Date(fechaCompleta)
                .toLocaleDateString('es-MX', {
                    day: '2-digit',
                    month: 'short'
                });

            pesos.push(peso);
            fechas.push(fecha);

            grafica.update();

            const tabla = document.getElementById('tablaRegistros');

            const nuevaFila = document.createElement('tr');

            nuevaFila.innerHTML = `
                <td>${fechaCompleta}</td>
                <td>${peso} kg</td>
                <td>
                    <span class="badge bg-success">
                        Registrado
                    </span>
                </td>
            `;

            tabla.insertBefore(nuevaFila, tabla.firstChild);

            document.getElementById('formPeso').reset();

        });

    </script>

</body>
</html>
